<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Renk Kodu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1b2a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 24px 16px;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 24px;
  }

  .tt-logo {
    background: #fff;
    border-radius: 12px;
    padding: 10px 22px;
    display: inline-block;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .tt-logo img {
    height: 40px;
    display: block;
  }

  h1 {
    color: #e8f4fd;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  h1 span {
    color: #f97316;
  }

  .subtitle {
    color: #64748b;
    font-size: 0.78rem;
    margin-top: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .card {
    background: #1e2d3d;
    border: 1px solid #2a3f55;
    border-radius: 16px;
    padding: 24px 20px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #4a90b8;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-size: 0.72rem;
    color: #8fafc9;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .input-group select,
  .input-group input {
    width: 100%;
    background: #0d1b2a;
    border: 1.5px solid #2a3f55;
    border-radius: 10px;
    color: #e8f4fd;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .input-group select:focus,
  .input-group input:focus {
    border-color: #f97316;
  }

  .input-group input::placeholder {
    color: #3d5570;
    font-weight: 400;
    font-size: 0.85rem;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 20px;
  }

  .btn:active { transform: scale(0.98); opacity: 0.9; }

  .divider {
    border: none;
    border-top: 1px solid #2a3f55;
    margin-bottom: 20px;
  }

  .result-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #4a90b8;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .result-box {
    background: #0d1b2a;
    border: 1.5px solid #2a3f55;
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    transition: border-color 0.3s;
  }

  .result-box.active {
    border-color: #f97316;
  }

  .result-box .r-label {
    font-size: 0.65rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .result-box .r-value {
    font-size: 1.05rem;
    font-weight: 800;
    color: #e8f4fd;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .color-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.2);
  }

  .error-msg {
    color: #f87171;
    font-size: 0.82rem;
    text-align: center;
    margin-top: -12px;
    margin-bottom: 12px;
    min-height: 18px;
  }

  .placeholder-text {
    color: #3d5570;
    font-size: 0.8rem;
    font-style: italic;
  }
</style>
</head>

  <div class="section-label">📥 Giriş</div>
  <div class="input-row">
    <div class="input-group">
      <label>Kablo Kapasitesi</label>
      <select id="kapasite">
        <option value="">Seçin</option>
        <option value="4">4</option>
        <option value="6">6</option>
        <option value="12">12</option>
        <option value="24">24</option>
        <option value="36">36</option>
        <option value="48">48</option>
        <option value="72">72</option>
        <option value="96">96</option>
        <option value="144">144</option>
      </select>
    </div>
    <div class="input-group">
      <label>Devre Numarası</label>
      <input type="number" id="devre" min="1" placeholder="Örn: 33">
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="btn" onclick="hesapla()">🔍 Sorgula</button>

  <hr class="divider">

  <div class="result-label">📤 Aradığınız Fiber Kıl Bilgileri</div>
  <div class="result-grid">
    <div class="result-box" id="box1">
      <div class="r-label">Fiber Tüp Rengi</div>
      <div class="r-value" id="tupRengi"><span class="placeholder-text">—</span></div>
    </div>
    <div class="result-box" id="box2">
      <div class="r-label">Sıra No</div>
      <div class="r-value" id="siraNo"><span class="placeholder-text">—</span></div>
    </div>
    <div class="result-box" id="box3">
      <div class="r-label">Fiber Kıl Rengi</div>
      <div class="r-value" id="kilRengi"><span class="placeholder-text">—</span></div>
    </div>
  </div>
</div>

<script>
// Tüp renkleri - 12/24/36 (6 tüp): Kırmızı, Sarı, Yeşil, Mavi, Menekşe, Beyaz
const tupRenkleri6 = [
  { ad: 'Kırmızı',    hex: '#ef4444' },
  { ad: 'Sarı',       hex: '#eab308' },
  { ad: 'Yeşil',      hex: '#22c55e' },
  { ad: 'Mavi',       hex: '#3b82f6' },
  { ad: 'Menekşe',    hex: '#a855f7' },
  { ad: 'Beyaz',      hex: '#f1f5f9' },
];

// Tüp renkleri - 48/72 (4-6 tüp): Kırmızı, Sarı, Yeşil, Mavi, Menekşe, Kahverengi
const tupRenkleri72 = [
  { ad: 'Kırmızı',    hex: '#ef4444' },
  { ad: 'Sarı',       hex: '#eab308' },
  { ad: 'Yeşil',      hex: '#22c55e' },
  { ad: 'Mavi',       hex: '#3b82f6' },
  { ad: 'Menekşe',    hex: '#a855f7' },
  { ad: 'Beyaz',      hex: '#f1f5f9' },
];

// Tüp renkleri - 96/144 (8-12 tüp)
const tupRenkleri144 = [
  { ad: 'Kırmızı',    hex: '#ef4444' },
  { ad: 'Sarı',       hex: '#eab308' },
  { ad: 'Yeşil',      hex: '#22c55e' },
  { ad: 'Mavi',       hex: '#3b82f6' },
  { ad: 'Menekşe',    hex: '#a855f7' },
  { ad: 'Kahverengi', hex: '#92400e' },
  { ad: 'Siyah',      hex: '#334155' },
  { ad: 'Turuncu',    hex: '#f97316' },
  { ad: 'Pembe',      hex: '#ec4899' },
  { ad: 'Gri',        hex: '#94a3b8' },
  { ad: 'Açık Yeşil', hex: '#86efac' },
  { ad: 'Beyaz',      hex: '#f1f5f9' },
];

// Kablo kapasitesine göre yapı: { tupBasi, kilSayisi, kilRenkleri }
// 4 fiber: 1 tüp × 4 kıl (Kırmızı, Sarı, Yeşil, Mavi)
// 6 fiber: 1 tüp × 6 kıl
// 12 fiber: 6 tüp × 2 kıl (Kırmızı, Naturel pattern'e göre değişiyor)
// Fotoğraftaki tablolara göre:

const kilRenkleri6 = [
  { ad: 'Kırmızı', hex: '#ef4444' },
  { ad: 'Sarı',    hex: '#eab308' },
  { ad: 'Yeşil',   hex: '#22c55e' },
  { ad: 'Mavi',    hex: '#3b82f6' },
  { ad: 'Menekşe', hex: '#a855f7' },
  { ad: 'Naturel', hex: '#d4c5a9' },
];

const kilRenkleri4 = [
  { ad: 'Kırmızı', hex: '#ef4444' },
  { ad: 'Sarı',    hex: '#eab308' },
  { ad: 'Yeşil',   hex: '#22c55e' },
  { ad: 'Naturel', hex: '#d4c5a9' },
];

// 12'lik: 6 tüp, her tüpte 2 kıl (Kırmızı, Naturel)
// Tüpler: Kırmızı, Sarı, Yeşil, Mavi, Menekşe, Beyaz
const kilRenkleri2 = [
  { ad: 'Kırmızı', hex: '#ef4444' },
  { ad: 'Naturel', hex: '#d4c5a9' },
];

// 24'lük: 6 tüp × 4 kıl
const kilRenkleri4v2 = kilRenkleri4;

// 36'lık: 6 tüp × 6 kıl
const kilRenkleri6v2 = kilRenkleri6;

// 48, 72, 96, 144: her tüpte 12 kıl
const kilRenkleri12 = [
  { ad: 'Kırmızı',    hex: '#ef4444' },
  { ad: 'Sarı',       hex: '#eab308' },
  { ad: 'Yeşil',      hex: '#22c55e' },
  { ad: 'Mavi',       hex: '#3b82f6' },
  { ad: 'Menekşe',    hex: '#a855f7' },
  { ad: 'Kahverengi', hex: '#92400e' },
  { ad: 'Siyah',      hex: '#334155' },
  { ad: 'Turuncu',    hex: '#f97316' },
  { ad: 'Pembe',      hex: '#ec4899' },
  { ad: 'Gri',        hex: '#94a3b8' },
  { ad: 'Açık Yeşil', hex: '#86efac' },
  { ad: 'Naturel',    hex: '#d4c5a9' },
];

function getYapi(kapasite) {
  switch(parseInt(kapasite)) {
    case 4:   return { kilSayisi: 4,  tupler: [tupRenkleri6[0]],         killer: kilRenkleri4 };
    case 6:   return { kilSayisi: 6,  tupler: [tupRenkleri6[0]],         killer: kilRenkleri6 };
    case 12:  return { kilSayisi: 2,  tupler: tupRenkleri6,              killer: kilRenkleri2 };
    case 24:  return { kilSayisi: 4,  tupler: tupRenkleri6,              killer: kilRenkleri4 };
    case 36:  return { kilSayisi: 6,  tupler: tupRenkleri6,              killer: kilRenkleri6 };
    case 48:  return { kilSayisi: 12, tupler: [tupRenkleri144[0],tupRenkleri144[1],tupRenkleri144[2],tupRenkleri144[11]], killer: kilRenkleri12 };
    case 72:  return { kilSayisi: 12, tupler: tupRenkleri72,             killer: kilRenkleri12 };
    case 96:  return { kilSayisi: 12, tupler: [tupRenkleri144[0],tupRenkleri144[1],tupRenkleri144[2],tupRenkleri144[3],tupRenkleri144[4],tupRenkleri144[5],tupRenkleri144[6],tupRenkleri144[11]], killer: kilRenkleri12 };
    case 144: return { kilSayisi: 12, tupler: tupRenkleri144,            killer: kilRenkleri12 };
    default: return null;
  }
}

function hesapla() {
  const kapasite = document.getElementById('kapasite').value;
  const devre    = parseInt(document.getElementById('devre').value);
  const errorEl  = document.getElementById('errorMsg');

  // Reset
  errorEl.textContent = '';
  ['box1','box2','box3'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('tupRengi').innerHTML = '<span class="placeholder-text">—</span>';
  document.getElementById('siraNo').innerHTML   = '<span class="placeholder-text">—</span>';
  document.getElementById('kilRengi').innerHTML = '<span class="placeholder-text">—</span>';

  if (!kapasite) { errorEl.textContent = 'Lütfen kablo kapasitesi seçin.'; return; }
  if (!devre || devre < 1) { errorEl.textContent = 'Lütfen geçerli bir devre numarası girin.'; return; }

  const yapi = getYapi(kapasite);
  const maxFiber = yapi.tupler.length * yapi.kilSayisi;

  if (devre > maxFiber) {
    errorEl.textContent = `Bu kablo için maksimum devre sayısı ${maxFiber}.`;
    return;
  }

  const tupIndex = Math.floor((devre - 1) / yapi.kilSayisi);
  const kilIndex = (devre - 1) % yapi.kilSayisi;

  const tup = yapi.tupler[tupIndex];
  const kil = yapi.killer[kilIndex];

  // Render
  document.getElementById('tupRengi').innerHTML =
    `<span class="color-dot" style="background:${tup.hex}"></span>${tup.ad}`;
  document.getElementById('siraNo').innerHTML = devre;
  document.getElementById('kilRengi').innerHTML =
    `<span class="color-dot" style="background:${kil.hex}"></span>${kil.ad}`;

  ['box1','box2','box3'].forEach(id => document.getElementById(id).classList.add('active'));
}

document.getElementById('devre').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') hesapla();
});
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>
</body>
</html>
